<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Config Manager</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&family=Fira+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#5a82b5;--sec:#c4785a;--pos:#5a9fc4;--neg:#c45a5a;--done:#4a9a6a;--warn:#c4a85a;--text:#d0d7de;--dim:#8b95a5;--muted:#6b7585;--input-bg:#1e2a3a;--input-border:#2a3a4a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1a2332;--dim:#5a6878;--muted:#8494a7;--input-bg:#f0f2f5;--input-border:#c5cdd8;--done:#3a8a5a;--warn:#a48a3a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:0;transition:background .3s,color .3s;height:100vh;overflow:hidden}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--dim);font-size:14px}
#dash{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:290px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg)}
.sidebar-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.filter-row{display:flex;gap:6px}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:var(--dim);font-family:'Nunito Sans',sans-serif;transition:all .15s}
.filter-btn:hover{border-color:var(--pri);color:var(--text)}
.filter-btn.active{background:var(--pri);border-color:var(--pri);color:#fff}
.site-list{flex:1;overflow-y:auto;padding:8px}
.site-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 10px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.site-item:hover{border-color:var(--pri)}
.site-item.selected{border-color:var(--pri);background:rgba(90,130,181,.08)}
.site-name{font-size:12px;font-weight:600;margin-bottom:2px}
.site-url{font-size:11px;color:var(--dim);font-family:'Fira Mono',monospace}
.site-meta{display:flex;gap:8px;margin-top:5px;align-items:center}
.site-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.badge-live{background:rgba(74,154,106,.12);color:var(--done)}
.badge-dev{background:rgba(90,130,181,.12);color:var(--pri)}
.badge-internal{background:rgba(196,168,90,.1);color:var(--warn)}
.config-score{font-size:11px;font-weight:600;font-family:'Fira Mono',monospace}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.main-hdr h2{font-size:19px;font-weight:700}
.main-hdr .sub{font-size:13px;color:var(--dim);margin-top:2px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:var(--dim);font-family:'Nunito Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px}
.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.main-scroll{flex:1;overflow-y:auto;padding:16px 20px}
.section-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 10px;font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.section-hdr:first-child{margin-top:0}
.section-hdr svg{opacity:.7;flex-shrink:0}
.config-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:all .15s}
.config-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.config-name{font-size:15px;font-weight:600}
.config-level{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);background:rgba(139,149,165,.08)}
.config-desc{font-size:13px;color:var(--dim);margin-bottom:6px}
.config-doc{font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.doc-summary{color:var(--muted);font-style:italic}
.doc-link{color:var(--pri);text-decoration:none;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:3px}
.doc-link:hover{text-decoration:underline}
.config-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.status-group{display:flex;gap:4px}
.status-btn{background:transparent;border:1px solid var(--border);border-radius:5px;padding:5px 10px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Nunito Sans',sans-serif;color:var(--dim);transition:all .15s}
.status-btn:hover{border-color:var(--text);color:var(--text)}
.status-btn.s-done{border-color:var(--done);background:rgba(74,154,106,.12);color:var(--done)}
.status-btn.s-notdone{border-color:var(--neg);background:rgba(196,90,90,.1);color:var(--neg)}
.status-btn.s-needsupdate{border-color:var(--warn);background:rgba(196,168,90,.1);color:var(--warn)}
.date-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:4px 8px;color:var(--text);font-family:'Fira Mono',monospace;font-size:13px;transition:border-color .2s}
.date-input:focus{outline:none;border-color:var(--pri)}
.staleness{font-size:12px;color:var(--muted);font-family:'Fira Mono',monospace}
.staleness.stale{color:var(--warn)}
.staleness.very-stale{color:var(--neg)}
.notes-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:4px 8px;color:var(--text);font-family:'Nunito Sans',sans-serif;font-size:13px;width:100%;margin-top:8px;transition:border-color .2s}
.notes-input:focus{outline:none;border-color:var(--pri)}
.notes-input::placeholder{color:var(--muted)}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:16px;flex-direction:column;gap:8px}
.empty-state svg{opacity:.4}
.toast{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}
.t-ok{background:#0c2030;color:#5a9fc4;border:1px solid #2a4a5a}
.summary-bar{padding:8px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;justify-content:space-between}
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px}
.setting-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.setting-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:5px;font-weight:600}
.setting-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:4px 8px;color:var(--text);font-family:'Fira Mono',monospace;font-size:14px;width:100%;transition:border-color .2s}
.setting-input:focus{outline:none;border-color:var(--pri)}
.switch{position:relative;display:inline-block;width:36px;height:20px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);transition:.2s;border-radius:20px}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:var(--dim);transition:.2s;border-radius:50%}
input:checked+.slider{background:var(--done)}
input:checked+.slider:before{transform:translateX(16px);background:#fff}
.log-list{display:flex;flex-direction:column;gap:4px}
.log-entry{font-size:13px;padding:6px 10px;background:rgba(90,130,181,.04);border-radius:5px;display:flex;gap:8px;align-items:baseline}
.log-time{color:var(--muted);font-family:'Fira Mono',monospace;font-size:12px;white-space:nowrap}
.log-action{color:var(--text)}
.log-detail{color:var(--dim);font-family:'Fira Mono',monospace}
.log-empty{font-size:13px;color:var(--muted);font-style:italic;padding:8px 0}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Connecting to Grist…</p></div>
<div id="dash">
<div class="layout">
<div class="sidebar">
<div class="sidebar-hdr"><h1>Config Manager</h1>
<div class="filter-row">
<button class="filter-btn active" onclick="setFilter('all')">All</button>
<button class="filter-btn" onclick="setFilter('Live')">Live</button>
<button class="filter-btn" onclick="setFilter('Dev')">Dev</button>
<button class="filter-btn" onclick="setFilter('Internal')">Internal</button>
</div></div>
<div class="site-list" id="siteList"></div>
<div class="summary-bar" id="summaryBar"></div>
</div>
<div class="main">
<div class="main-hdr"><div><h2 id="mainTitle">Select a site</h2><div class="sub" id="mainSub"></div></div>
<button class="theme-btn" onclick="cycleTheme()" id="themeBtn"></button></div>
<div class="main-scroll" id="mainScroll">
<div class="empty-state" id="emptyState"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span>Select a site to view its config checklist</span></div>
<div id="mainContent" style="display:none">
<div class="section-hdr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Site Settings</div>
<div class="settings-grid" id="siteSettings"></div>
<div class="section-hdr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Config Checklist</div>
<div id="configList"></div>
<div class="section-hdr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="12 8 12 12 14 14"/><circle cx="12" cy="12" r="10"/></svg> Activity Log</div>
<div id="logList"></div>
</div></div></div></div></div>
<div class="toast" id="toast"></div>
<script>
let DATA=null,selectedSiteId=null,currentFilter='all',saveTimers={};
function getThemePref(){return localStorage.getItem('site-dash-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\ufe0f',dark:'\ud83c\udf19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p]}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('site-dash-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();
function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);r.push(o)}return r}
function ep2d(ts){if(!ts)return'';return new Date(ts*1000).toISOString().slice(0,10)}
function fmtTs(ts){if(!ts)return'';const d=new Date(ts*1000);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[d.getMonth()]+' '+d.getDate()+', '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}
grist.ready({requiredAccess:'full'});
async function load(){
  try{
    const[sites,servers,configs,statuses,logs]=await Promise.all([
      grist.docApi.fetchTable('Sites'),grist.docApi.fetchTable('Servers'),
      grist.docApi.fetchTable('Config_Items'),grist.docApi.fetchTable('Config_Status'),
      grist.docApi.fetchTable('Config_Log')]);
    DATA={sites:toRows(sites),servers:toRows(servers),configs:toRows(configs),statuses:toRows(statuses),logs:toRows(logs)};
    DATA.serverMap={};DATA.servers.forEach(s=>DATA.serverMap[s._id]=s);
    DATA.configMap={};DATA.configs.forEach(c=>DATA.configMap[c._id]=c);
    document.getElementById('loading').style.display='none';
    document.getElementById('dash').style.display='block';
    renderSidebar();if(selectedSiteId)renderMain(selectedSiteId);
  }catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}
}
load();grist.onRecords(()=>load());
function setFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.toggle('active',b.textContent===f||(f==='all'&&b.textContent==='All'))});renderSidebar()}
function renderSidebar(){
  const el=document.getElementById('siteList');
  let sites=DATA.sites.slice().sort((a,b)=>(a.Name||'').localeCompare(b.Name||''));
  if(currentFilter!=='all')sites=sites.filter(s=>s.Site_Type===currentFilter);
  const sm={};DATA.statuses.forEach(st=>{if(!sm[st.Site])sm[st.Site]={done:0,total:0};sm[st.Site].total++;if(st.Status==='Done')sm[st.Site].done++});
  let h='';sites.forEach(s=>{const srv=DATA.serverMap[s.Server];const ss=sm[s._id]||{done:0,total:0};const pct=ss.total>0?Math.round(ss.done/ss.total*100):0;const sc=pct===100?'var(--done)':pct>=50?'var(--warn)':'var(--neg)';const bc=s.Site_Type==='Live'?'badge-live':s.Site_Type==='Dev'?'badge-dev':'badge-internal';
  h+=`<div class="site-item${s._id===selectedSiteId?' selected':''}" onclick="selectSite(${s._id})"><div class="site-name">${s.Name||'Unnamed'}</div><div class="site-url">${s.Primary_URL||''}</div><div class="site-meta">${s.Site_Type?`<span class="site-badge ${bc}">${s.Site_Type}</span>`:''} ${srv?`<span style="font-size:9px;color:var(--muted)">${srv.Name}</span>`:''}<span class="config-score" style="color:${sc};margin-left:auto">${ss.done}/${ss.total}</span></div></div>`});
  el.innerHTML=h;
  const td=Object.values(sm).reduce((s,v)=>s+v.done,0),ta=Object.values(sm).reduce((s,v)=>s+v.total,0);
  document.getElementById('summaryBar').textContent=sites.length+' sites \u2022 '+td+'/'+ta+' configs done';
}
function selectSite(id){selectedSiteId=id;renderSidebar();renderMain(id)}
function renderMain(siteId){
  const site=DATA.sites.find(s=>s._id===siteId);if(!site)return;
  const srv=DATA.serverMap[site.Server];
  document.getElementById('mainTitle').textContent=site.Name||'Unnamed';
  document.getElementById('mainSub').textContent=[site.Primary_URL,srv?'on '+srv.Name:'',site.Site_Type].filter(Boolean).join(' \u2022 ');
  document.getElementById('emptyState').style.display='none';
  document.getElementById('mainContent').style.display='block';
  renderSettings(site);renderConfigs(siteId);renderLog(siteId);
}
function renderSettings(site){
  document.getElementById('siteSettings').innerHTML=`
    <div class="setting-card"><div class="setting-label">PHP Memory</div><input class="setting-input" value="${site.PHP_Memory||''}" placeholder="e.g. 512M" onchange="saveSiteSetting(${site._id},'PHP_Memory',this.value,'PHP Memory')"></div>
    <div class="setting-card"><div class="setting-label">Basic Auth</div><label class="switch"><input type="checkbox" ${site.Basic_Auth?'checked':''} onchange="saveSiteToggle(${site._id},'Basic_Auth',this.checked,'Basic Auth')"><span class="slider"></span></label></div>
    <div class="setting-card"><div class="setting-label">Search Engines Discouraged</div><label class="switch"><input type="checkbox" ${site.Search_Engines_Discouraged?'checked':''} onchange="saveSiteToggle(${site._id},'Search_Engines_Discouraged',this.checked,'Search Engines Discouraged')"><span class="slider"></span></label></div>`;
}
function renderConfigs(siteId){
  const ss=DATA.statuses.filter(st=>st.Site===siteId);const el=document.getElementById('configList');
  if(!ss.length){el.innerHTML='<div class="log-empty">No config items</div>';return}
  let h='';ss.forEach(st=>{const ci=DATA.configMap[st.Config_Item];if(!ci)return;
    const dv=st.Last_Applied?ep2d(st.Last_Applied):'';
    let sh='';if(st.Last_Applied){const days=Math.round((Date.now()/1000-st.Last_Applied)/86400);sh=`<span class="staleness ${days>90?'very-stale':days>30?'stale':''}">${days}d ago</span>`}
    let dh='';if(ci.Doc_Summary||ci.Doc_URL){dh='<div class="config-doc">';if(ci.Doc_Summary)dh+='<span class="doc-summary">'+ci.Doc_Summary+'</span>';if(ci.Doc_URL)dh+='<a class="doc-link" href="'+ci.Doc_URL+'" target="_blank"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Docs</a>';dh+='</div>'}
    const esc=s=>(s||'').replace(/'/g,"\\'");
    h+=`<div class="config-card"><div class="config-top"><div class="config-name">${ci.Name}</div><span class="config-level">${ci.Level||''}</span></div>${ci.Description?'<div class="config-desc">'+ci.Description+'</div>':''}${dh}<div class="config-controls"><div class="status-group"><button class="status-btn${st.Status==='Done'?' s-done':''}" onclick="setStatus(${st._id},${siteId},${st.Config_Item},'Done','${esc(st.Status)}')">Done</button><button class="status-btn${st.Status==='Not Done'?' s-notdone':''}" onclick="setStatus(${st._id},${siteId},${st.Config_Item},'Not Done','${esc(st.Status)}')">Not Done</button><button class="status-btn${st.Status==='Needs Update'?' s-needsupdate':''}" onclick="setStatus(${st._id},${siteId},${st.Config_Item},'Needs Update','${esc(st.Status)}')">Needs Update</button></div><input type="date" class="date-input" value="${dv}" onchange="setDate(${st._id},${siteId},${st.Config_Item},this.value,'${dv}')" title="Last applied"> ${sh}</div><input type="text" class="notes-input" value="${(st.Notes||'').replace(/"/g,'&quot;')}" placeholder="Notes\u2026" oninput="debouncedSetNotes(${st._id},${siteId},${st.Config_Item},this.value)"></div>`});
  el.innerHTML=h;
}
function renderLog(siteId){
  const el=document.getElementById('logList');
  const sl=DATA.logs.filter(l=>l.Site===siteId).sort((a,b)=>(b.Timestamp||0)-(a.Timestamp||0)).slice(0,20);
  if(!sl.length){el.innerHTML='<div class="log-empty">No activity logged yet</div>';return}
  let h='<div class="log-list">';sl.forEach(l=>{
    const ci=l.Config_Item?DATA.configMap[l.Config_Item]:null;const cn=ci?ci.Name:'Site setting';
    let dt='';if(l.Old_Value&&l.New_Value)dt=l.Old_Value+' \u2192 '+l.New_Value;else if(l.New_Value)dt=l.New_Value;
    h+=`<div class="log-entry"><span class="log-time">${fmtTs(l.Timestamp)}</span><span class="log-action"><strong>${cn}</strong> \u2014 ${l.Action||''}</span>${dt?'<span class="log-detail">'+dt+'</span>':''}</div>`});
  h+='</div>';el.innerHTML=h;
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast show t-ok';setTimeout(()=>{t.className='toast'},2000)}
async function writeLog(siteId,ciId,action,field,oldV,newV,notes){
  try{await grist.getTable('Config_Log').create({fields:{Site:siteId,Config_Item:ciId||0,Timestamp:Math.floor(Date.now()/1000),Action:action,Field_Changed:field||'',Old_Value:String(oldV||''),New_Value:String(newV||''),Notes:notes||''}})}catch(e){console.error('Log:',e)}
}
async function setStatus(rowId,siteId,ciId,status,old){
  if(status===old)return;
  try{const f={Status:status};if(status==='Done')f.Last_Applied=Math.floor(Date.now()/1000);
  await grist.getTable('Config_Status').update({id:rowId,fields:f});
  await writeLog(siteId,ciId,'Status changed','Status',old,status);showToast('Status updated')}catch(e){console.error(e)}
}
async function setDate(rowId,siteId,ciId,ds,old){
  try{const ep=ds?Math.floor(new Date(ds+'T12:00:00').getTime()/1000):null;
  await grist.getTable('Config_Status').update({id:rowId,fields:{Last_Applied:ep}});
  await writeLog(siteId,ciId,'Date changed','Last Applied',old,ds);showToast('Date updated')}catch(e){console.error(e)}
}
function debouncedSetNotes(rowId,siteId,ciId,val){const k='n-'+rowId;if(saveTimers[k])clearTimeout(saveTimers[k]);saveTimers[k]=setTimeout(()=>setNotes(rowId,siteId,ciId,val),800)}
async function setNotes(rowId,siteId,ciId,val){
  try{await grist.getTable('Config_Status').update({id:rowId,fields:{Notes:val}});
  await writeLog(siteId,ciId,'Notes updated','Notes','',val);showToast('Notes saved')}catch(e){console.error(e)}
}
async function saveSiteSetting(siteId,field,val,label){
  const site=DATA.sites.find(s=>s._id===siteId);const old=site?site[field]||'':'';
  try{await grist.getTable('Sites').update({id:siteId,fields:{[field]:val}});
  await writeLog(siteId,0,label+' changed',label,old,val);showToast(label+' updated')}catch(e){console.error(e)}
}
async function saveSiteToggle(siteId,field,checked,label){
  const site=DATA.sites.find(s=>s._id===siteId);const old=site?site[field]:'';
  try{await grist.getTable('Sites').update({id:siteId,fields:{[field]:checked}});
  await writeLog(siteId,0,label+(checked?' enabled':' disabled'),label,old?'On':'Off',checked?'On':'Off');showToast(label+' updated')}catch(e){console.error(e)}
}
</script>
