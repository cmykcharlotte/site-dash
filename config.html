<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Config Manager</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#5a82b5;--sec:#c4785a;--pos:#5a9fc4;--neg:#c45a5a;--done:#4a9a6a;--warn:#c4a85a;--text:#d0d7de;--dim:#8b95a5;--muted:#6b7585;--input-bg:#1e2a3a;--input-border:#2a3a4a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1a2332;--dim:#5a6878;--muted:#8494a7;--input-bg:#f0f2f5;--input-border:#c5cdd8;--done:#3a8a5a;--warn:#a48a3a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:0;transition:background .3s,color .3s;height:100vh;overflow:hidden}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--dim);font-size:13px}
#dash{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:320px;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg)}
.sidebar-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-hdr h1{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.filter-row{display:flex;gap:6px}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn:hover{border-color:var(--pri);color:var(--text)}
.filter-btn.active{background:var(--pri);border-color:var(--pri);color:#fff}
.site-list{flex:1;overflow-y:auto;padding:8px}
.site-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.site-item:hover{border-color:var(--pri)}
.site-item.selected{border-color:var(--pri);background:rgba(90,130,181,.08)}
.site-name{font-size:13px;font-weight:600;margin-bottom:2px}
.site-url{font-size:11px;color:var(--dim);font-family:'DM Mono',monospace}
.site-meta{display:flex;gap:8px;margin-top:5px;align-items:center}
.site-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.badge-live{background:rgba(74,154,106,.12);color:var(--done)}
.badge-dev{background:rgba(90,130,181,.12);color:var(--pri)}
.badge-internal{background:rgba(196,168,90,.1);color:var(--warn)}
.config-score{font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.main-hdr h2{font-size:17px;font-weight:700}
.main-hdr .sub{font-size:12px;color:var(--dim);margin-top:2px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px}
.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.config-list{flex:1;overflow-y:auto;padding:16px 20px}
.config-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:all .15s}
.config-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.config-name{font-size:14px;font-weight:600}
.config-level{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);background:rgba(139,149,165,.08)}
.config-desc{font-size:12px;color:var(--dim);margin-bottom:10px}
.config-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.status-group{display:flex;gap:4px}
.status-btn{background:transparent;border:1px solid var(--border);border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--dim);transition:all .15s}
.status-btn:hover{border-color:var(--text);color:var(--text)}
.status-btn.s-done{border-color:var(--done);background:rgba(74,154,106,.12);color:var(--done)}
.status-btn.s-notdone{border-color:var(--neg);background:rgba(196,90,90,.1);color:var(--neg)}
.status-btn.s-needsupdate{border-color:var(--warn);background:rgba(196,168,90,.1);color:var(--warn)}
.date-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:4px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;transition:border-color .2s}
.date-input:focus{outline:none;border-color:var(--pri)}
.staleness{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.staleness.stale{color:var(--warn)}
.staleness.very-stale{color:var(--neg)}
.notes-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:4px 8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:11px;width:100%;margin-top:8px;transition:border-color .2s}
.notes-input:focus{outline:none;border-color:var(--pri)}
.notes-input::placeholder{color:var(--muted)}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:14px;flex-direction:column;gap:8px}
.empty-state svg{opacity:.4}
.toast{position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:7px;font-size:11px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}
.t-ok{background:#0c2030;color:#5a9fc4;border:1px solid #2a4a5a}
.summary-bar{padding:10px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;justify-content:space-between}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Connecting to Grist…</p></div>
<div id="dash">
<div class="layout">
<div class="sidebar">
<div class="sidebar-hdr">
<h1>Config Manager</h1>
<div class="filter-row">
<button class="filter-btn active" onclick="setFilter('all')">All</button>
<button class="filter-btn" onclick="setFilter('Live')">Live</button>
<button class="filter-btn" onclick="setFilter('Dev')">Dev</button>
<button class="filter-btn" onclick="setFilter('Internal')">Internal</button>
</div>
</div>
<div class="site-list" id="siteList"></div>
<div class="summary-bar" id="summaryBar"></div>
</div>
<div class="main">
<div class="main-hdr" id="mainHdr">
<div><h2 id="mainTitle">Select a site</h2><div class="sub" id="mainSub"></div></div>
<button class="theme-btn" onclick="cycleTheme()" id="themeBtn"></button>
</div>
<div class="config-list" id="configList">
<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span>Select a site to view its config checklist</span></div>
</div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
let DATA=null,selectedSiteId=null,currentFilter='all',saveTimers={};

function getThemePref(){return localStorage.getItem('site-dash-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p]}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('site-dash-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();

function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);r.push(o)}return r}

grist.ready({requiredAccess:'full'});

async function load(){
  try{
    const[sites,servers,configs,statuses]=await Promise.all([
      grist.docApi.fetchTable('Sites'),
      grist.docApi.fetchTable('Servers'),
      grist.docApi.fetchTable('Config_Items'),
      grist.docApi.fetchTable('Config_Status')
    ]);
    DATA={sites:toRows(sites),servers:toRows(servers),configs:toRows(configs),statuses:toRows(statuses)};
    DATA.serverMap={};DATA.servers.forEach(s=>DATA.serverMap[s._id]=s);
    document.getElementById('loading').style.display='none';
    document.getElementById('dash').style.display='block';
    renderSidebar();
    if(selectedSiteId)renderConfigs(selectedSiteId);
  }catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}
}
load();
grist.onRecords(()=>load());

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.toggle('active',b.textContent===f||(f==='all'&&b.textContent==='All'))});
  renderSidebar();
}

function renderSidebar(){
  const el=document.getElementById('siteList');
  let sites=DATA.sites.slice().sort((a,b)=>(a.Name||'').localeCompare(b.Name||''));
  if(currentFilter!=='all')sites=sites.filter(s=>s.Site_Type===currentFilter);

  const statusMap={};
  DATA.statuses.forEach(st=>{
    if(!statusMap[st.Site])statusMap[st.Site]={done:0,total:0};
    statusMap[st.Site].total++;
    if(st.Status==='Done')statusMap[st.Site].done++;
  });

  let html='';
  sites.forEach(s=>{
    const server=DATA.serverMap[s.Server];
    const sm=statusMap[s._id]||{done:0,total:0};
    const pct=sm.total>0?Math.round(sm.done/sm.total*100):0;
    const scoreColor=pct===100?'var(--done)':pct>=50?'var(--warn)':'var(--neg)';
    const badgeClass=s.Site_Type==='Live'?'badge-live':s.Site_Type==='Dev'?'badge-dev':'badge-internal';
    html+=`<div class="site-item${s._id===selectedSiteId?' selected':''}" onclick="selectSite(${s._id})">
      <div class="site-name">${s.Name||'Unnamed'}</div>
      <div class="site-url">${s.Primary_URL||''}</div>
      <div class="site-meta">
        ${s.Site_Type?`<span class="site-badge ${badgeClass}">${s.Site_Type}</span>`:''}
        ${server?`<span style="font-size:10px;color:var(--muted)">${server.Name}</span>`:''}
        <span class="config-score" style="color:${scoreColor};margin-left:auto">${sm.done}/${sm.total}</span>
      </div>
    </div>`;
  });
  el.innerHTML=html;

  const totalDone=Object.values(statusMap).reduce((s,v)=>s+v.done,0);
  const totalAll=Object.values(statusMap).reduce((s,v)=>s+v.total,0);
  document.getElementById('summaryBar').textContent=`${sites.length} sites \u2022 ${totalDone}/${totalAll} configs done`;
}

function selectSite(id){
  selectedSiteId=id;
  renderSidebar();
  renderConfigs(id);
}

function ep2d(ts){if(!ts)return'';return new Date(ts*1000).toISOString().slice(0,10)}

function renderConfigs(siteId){
  const site=DATA.sites.find(s=>s._id===siteId);
  if(!site)return;
  const server=DATA.serverMap[site.Server];

  document.getElementById('mainTitle').textContent=site.Name||'Unnamed';
  document.getElementById('mainSub').textContent=[site.Primary_URL,server?'on '+server.Name:'',site.Site_Type].filter(Boolean).join(' \u2022 ');

  const siteStatuses=DATA.statuses.filter(st=>st.Site===siteId);
  const el=document.getElementById('configList');

  if(!siteStatuses.length){
    el.innerHTML='<div class="empty-state"><span>No config items for this site</span></div>';
    return;
  }

  let html='';
  siteStatuses.forEach(st=>{
    const ci=DATA.configs.find(c=>c._id===st.Config_Item);
    if(!ci)return;

    const dateVal=st.Last_Applied?ep2d(st.Last_Applied):'';
    let stalenessHtml='';
    if(st.Last_Applied){
      const days=Math.round((Date.now()/1000-st.Last_Applied)/86400);
      const cls=days>90?'very-stale':days>30?'stale':'';
      stalenessHtml=`<span class="staleness ${cls}">${days}d ago</span>`;
    }

    html+=`<div class="config-card">
      <div class="config-top">
        <div class="config-name">${ci.Name}</div>
        <span class="config-level">${ci.Level||''}</span>
      </div>
      ${ci.Description?`<div class="config-desc">${ci.Description}</div>`:''}
      <div class="config-controls">
        <div class="status-group">
          <button class="status-btn${st.Status==='Done'?' s-done':''}" onclick="setStatus(${st._id},'Done')">Done</button>
          <button class="status-btn${st.Status==='Not Done'?' s-notdone':''}" onclick="setStatus(${st._id},'Not Done')">Not Done</button>
          <button class="status-btn${st.Status==='Needs Update'?' s-needsupdate':''}" onclick="setStatus(${st._id},'Needs Update')">Needs Update</button>
        </div>
        <input type="date" class="date-input" value="${dateVal}" onchange="setDate(${st._id},this.value)" title="Last applied">
        ${stalenessHtml}
      </div>
      <input type="text" class="notes-input" value="${st.Notes||''}" placeholder="Notes…" oninput="debouncedSetNotes(${st._id},this.value)">
    </div>`;
  });
  el.innerHTML=html;
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast show t-ok';setTimeout(()=>{t.className='toast'},2000)}

async function setStatus(rowId,status){
  try{
    const table=grist.getTable('Config_Status');
    const fields={Status:status};
    if(status==='Done')fields.Last_Applied=Math.floor(Date.now()/1000);
    await table.update({id:rowId,fields});
    showToast('Status updated');
  }catch(e){console.error(e)}
}

async function setDate(rowId,dateStr){
  try{
    const table=grist.getTable('Config_Status');
    const epoch=dateStr?Math.floor(new Date(dateStr+'T12:00:00').getTime()/1000):null;
    await table.update({id:rowId,fields:{Last_Applied:epoch}});
    showToast('Date updated');
  }catch(e){console.error(e)}
}

function debouncedSetNotes(rowId,val){
  if(saveTimers[rowId])clearTimeout(saveTimers[rowId]);
  saveTimers[rowId]=setTimeout(()=>setNotes(rowId,val),800);
}

async function setNotes(rowId,val){
  try{
    const table=grist.getTable('Config_Status');
    await table.update({id:rowId,fields:{Notes:val}});
    showToast('Notes saved');
  }catch(e){console.error(e)}
}
</script>
</body>
</html>
